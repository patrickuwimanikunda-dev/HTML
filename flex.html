            /* justify-items: center; */
            /* align-content: center; */
            border-radius: 6px;
            /* flex-grow: 2; */
            flex-shrink: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">Box 1</div>
        <div class="box">Box 2</div>
        <div class="box">Box 3</div>
        <div class="box">Box 4</div>
    </div>

</html>
